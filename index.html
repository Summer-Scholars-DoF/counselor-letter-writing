<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecOS — The Lawrenceville School</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   LAWRENCEVILLE BRAND SYSTEM
   Primary: #ba0c2f (red), #000000 (black), #ffffff (white)
   Secondary: #b38d42 (gold), #8c122a (dark red), #434343 (gray)
   Fonts: Georgia (headings), Arial (body)
   ═══════════════════════════════════════════════════ */
:root {
  --red: #ba0c2f;
  --dk-red: #8c122a;
  --black: #000000;
  --gold: #b38d42;
  --gray: #434343;
  --lt-gray: #f7f6f4;
  --mid-gray: #e8e6e2;
  --border: #d5d1ca;
  --white: #ffffff;
  --font-h: Georgia, 'Times New Roman', serif;
  --font-b: Arial, Helvetica, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-b);background:var(--lt-gray);color:var(--black)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
button,input,select,textarea{font-family:var(--font-b)}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh}

/* ── Top Bar ── */
.topbar{
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.topbar-main{
  padding:12px 24px;display:flex;align-items:center;gap:20px;
  border-bottom:3px solid var(--red);
}
.logo-area{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-seal{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:var(--white);font-family:var(--font-h);font-size:14px;font-weight:bold;letter-spacing:-0.5px}
.logo-text{font-family:var(--font-h);font-size:17px;color:var(--black);line-height:1.15}
.logo-text span{display:block;font-size:10px;color:var(--gold);font-family:var(--font-b);font-weight:bold;letter-spacing:0.12em;text-transform:uppercase}
.gold-divider{width:1px;height:28px;background:var(--gold);flex-shrink:0}

/* Student tabs */
.stu-row{padding:8px 24px;display:flex;align-items:center;gap:6px;overflow-x:auto;background:var(--lt-gray)}
.stu-row::-webkit-scrollbar{height:3px}
.stu-tab{
  padding:6px 16px;border-radius:4px 4px 0 0;border:1px solid var(--border);border-bottom:none;
  background:var(--white);color:var(--gray);cursor:pointer;font-size:12px;font-weight:bold;
  white-space:nowrap;transition:all .15s;flex-shrink:0;position:relative;
}
.stu-tab:hover{color:var(--black);border-color:var(--gold)}
.stu-tab.on{background:var(--white);color:var(--red);border-color:var(--red);border-bottom:2px solid var(--white);margin-bottom:-1px;z-index:1}
.stu-tab .x{margin-left:8px;opacity:0;font-size:10px;color:var(--gray);transition:opacity .15s}
.stu-tab:hover .x{opacity:.6}
.stu-tab .x:hover{opacity:1;color:var(--red)}
.add-stu{
  padding:6px 14px;border-radius:4px;border:1px dashed var(--border);
  background:transparent;color:var(--gold);cursor:pointer;font-size:16px;font-weight:bold;
  flex-shrink:0;transition:all .15s;
}
.add-stu:hover{border-color:var(--red);color:var(--red)}

/* ── Main Area ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Toolbar */
.toolbar{
  padding:12px 24px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0;flex-wrap:wrap;
}
.toolbar-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.toolbar-right{display:flex;align-items:center;gap:8px}
.upload-btn{
  padding:8px 18px;border-radius:4px;border:none;
  background:var(--red);color:var(--white);cursor:pointer;
  font-size:13px;font-weight:bold;display:flex;align-items:center;gap:6px;
  transition:background .15s;
}
.upload-btn:hover{background:var(--dk-red)}
.view-btn{
  padding:6px 12px;border-radius:4px;border:1px solid var(--border);
  background:var(--white);color:var(--gray);cursor:pointer;font-size:12px;font-weight:bold;
  transition:all .12s;
}
.view-btn.on{background:var(--black);color:var(--white);border-color:var(--black)}
.view-btn:hover:not(.on){border-color:var(--gold);color:var(--black)}
.doc-count{font-size:12px;color:var(--gray)}

/* Content area */
.content{flex:1;overflow-y:auto;padding:16px 24px}

/* ── Accordion View ── */
.dc{border:1px solid var(--border);border-radius:4px;margin-bottom:6px;background:var(--white);overflow:hidden;transition:border-color .15s}
.dc.open{border-color:var(--gold)}
.dc-h{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 16px;background:none;border:none;cursor:pointer;text-align:left;
}
.dc-h:hover{background:var(--lt-gray)}
.dc-chev{color:var(--gray);flex-shrink:0;font-size:11px;transition:transform .15s}
.dc-badge{
  padding:2px 10px;border-radius:2px;font-size:10px;font-weight:bold;
  letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;
  font-family:var(--font-b);
}
.dc-title{font-size:13px;font-weight:bold;color:var(--black);font-family:var(--font-h);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-title-input{font-size:13px;font-weight:bold;color:var(--black);font-family:var(--font-h);border:1px solid var(--gold);border-radius:3px;padding:2px 8px;outline:none;width:100%}
.dc-meta{font-size:10px;color:var(--gray);flex-shrink:0;font-style:italic}
.dc-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.dc-h:hover .dc-actions{opacity:1}
.dc-act-btn{padding:3px 8px;border-radius:3px;border:none;background:transparent;color:var(--gray);cursor:pointer;font-size:11px;font-weight:bold}
.dc-act-btn:hover{background:var(--mid-gray);color:var(--black)}
.dc-act-btn.del:hover{background:#fef2f2;color:var(--red)}
.dc-body{border-top:1px solid var(--border)}
.gold-rule{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:0 16px}
.pdf-pages{max-height:650px;overflow-y:auto;background:#e8e6e1;padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.pdf-pages canvas{display:block;max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.12);background:var(--white)}
.text-content{padding:16px 20px;font-size:14px;line-height:1.8;color:var(--black);white-space:pre-wrap;max-height:500px;overflow-y:auto}

/* ── Gallery View ── */
.gallery{display:flex;gap:16px;overflow-x:auto;padding:16px 0;height:100%}
.gallery::-webkit-scrollbar{height:8px}
.gal-card{
  flex-shrink:0;width:420px;display:flex;flex-direction:column;
  border:1px solid var(--border);border-radius:4px;background:var(--white);overflow:hidden;
}
.gal-card-header{
  padding:8px 14px;border-bottom:2px solid var(--red);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.gal-card-title{font-family:var(--font-h);font-size:12.5px;font-weight:bold;color:var(--black);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gal-card-badge{padding:1px 8px;border-radius:2px;font-size:9px;font-weight:bold;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.gal-card-body{flex:1;overflow-y:auto;background:#e8e6e1}
.gal-card-body canvas{display:block;width:100%;margin-bottom:4px}
.gal-card-actions{padding:6px 10px;border-top:1px solid var(--border);display:flex;gap:4px;flex-shrink:0;background:var(--lt-gray)}

/* ── Empty States ── */
.empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.2}
.empty-title{font-family:var(--font-h);font-size:16px;color:var(--gray);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--gray);line-height:1.6;max-width:420px;margin:0 auto}

/* ── Modal ── */
.modal-ov{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
.modal-bx{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:24px;width:420px;max-width:90vw}
.modal-bx h3{font-family:var(--font-h);font-size:17px;color:var(--black);margin:0 0 16px;border-bottom:2px solid var(--red);padding-bottom:8px}
.modal-bx input{width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--border);background:var(--lt-gray);color:var(--black);font-size:14px;outline:none}
.modal-bx input:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-r{padding:8px 18px;border-radius:4px;border:none;background:var(--red);color:var(--white);cursor:pointer;font-size:13px;font-weight:bold}
.btn-r:hover{background:var(--dk-red)}
.btn-r:disabled{opacity:.4;cursor:default}
.btn-o{padding:8px 18px;border-radius:4px;border:1px solid var(--border);background:var(--white);color:var(--gray);cursor:pointer;font-size:13px}
.btn-o:hover{border-color:var(--gold);color:var(--black)}
.confirm-msg{font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:16px}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--black);color:var(--white);padding:10px 20px;border-radius:4px;font-size:13px;font-weight:bold;display:none;white-space:nowrap;border-left:3px solid var(--gold)}

/* ── Dots ── */
.dots{display:inline-flex;gap:3px;align-items:center}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--red);opacity:.3;animation:bk 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bk{0%,100%{opacity:.15}50%{opacity:.7}}
.hid{display:none!important}

/* ── Gold accent line (decorative) ── */
.gold-accent{height:1px;background:linear-gradient(90deg,transparent,var(--gold) 20%,var(--gold) 80%,transparent);margin:0}
</style>
</head>
<body>

<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-main">
      <div class="logo-area">
        <div class="logo-seal">L</div>
        <div class="logo-text">RecOS<span>College Counseling</span></div>
      </div>
      <div class="gold-divider"></div>
      <div class="stu-row" id="stu-tabs"></div>
      <button class="add-stu" id="add-stu-btn" title="Add student">+</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <!-- No student state -->
    <div id="no-stu" class="content" style="display:flex;align-items:center;justify-content:center">
      <div class="empty">
        <div class="empty-icon">◆</div>
        <div class="empty-title">No students yet</div>
        <div class="empty-sub">Click <strong>+</strong> above to add your first student.</div>
      </div>
    </div>

    <!-- Student view -->
    <div id="stu-view" class="hid" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="upload-btn" id="upload-btn" style="position:relative;overflow:hidden">
            <span style="font-size:15px">+</span> Add Documents
            <input type="file" id="file-input" accept=".pdf,.txt,.md" multiple style="position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1">
          </button>
          <span class="doc-count" id="doc-count"></span>
        </div>
        <div class="toolbar-right">
          <button class="view-btn on" data-view="accordion" onclick="setView('accordion')">☰ List</button>
          <button class="view-btn" data-view="gallery" onclick="setView('gallery')">⊞ Gallery</button>
        </div>
      </div>

      <div class="content" id="content-area">
        <div id="no-docs" class="empty">
          <div class="empty-icon">◇</div>
          <div class="empty-title">No documents yet</div>
          <div class="empty-sub">Upload PDFs from this student's Drive folder. Documents are auto-titled from their content.</div>
        </div>
        <div id="accordion-view"></div>
        <div id="gallery-view" class="gallery hid"></div>
      </div>

    </div>
  </div>
</div>

<!-- Add Student Modal -->
<div id="add-modal" class="modal-ov hid">
  <div class="modal-bx">
    <h3>Add Student</h3>
    <input id="add-name" placeholder="LastName, FirstName">
    <div class="modal-actions">
      <button class="btn-o" onclick="hideAdd()">Cancel</button>
      <button class="btn-r" id="add-go" onclick="addStu()" disabled>Add Student</button>
    </div>
  </div>
</div>

<!-- Delete Doc Modal -->
<div id="del-modal" class="modal-ov hid">
  <div class="modal-bx">
    <h3>Remove Document</h3>
    <div class="confirm-msg" id="del-msg"></div>
    <div class="modal-actions">
      <button class="btn-o" onclick="hideDel()">Cancel</button>
      <button class="btn-r" onclick="confirmDel()">Remove</button>
    </div>
  </div>
</div>

<!-- Delete Student Modal -->
<div id="del-stu-modal" class="modal-ov hid">
  <div class="modal-bx">
    <h3>Remove Student</h3>
    <div class="confirm-msg" id="del-stu-msg"></div>
    <div class="modal-actions">
      <button class="btn-o" onclick="hideDelStu()">Cancel</button>
      <button class="btn-r" onclick="confirmDelStu()">Remove</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ══════════════ STATE ══════════════
let students=[], curStu=null, openDocs={}, curView='accordion';
let delTarget=null, delStuTarget=null, editingTitle=null;

const DT={
  transcript:{l:'Transcript',c:'var(--red)',bg:'#ba0c2f15'},
  report:{l:'Report',c:'var(--dk-red)',bg:'#8c122a15'},
  comments:{l:'Comments',c:'var(--gold)',bg:'#b38d4215'},
  survey:{l:'Survey',c:'#2d7d46',bg:'#2d7d4615'},
  parent:{l:'Parent',c:'var(--gray)',bg:'#43434315'},
  teacher:{l:'Teacher Rec',c:'var(--red)',bg:'#ba0c2f15'},
  counselor:{l:'Counselor',c:'var(--gold)',bg:'#b38d4215'},
  other:{l:'Document',c:'var(--gray)',bg:'#43434315'},
};

// ══════════════ AUTO-TITLE (from first page text) ══════════════
function autoTitle(fileName, fpText){
  const txt = (fpText||'').replace(/\s+/g,' ');
  const fn = fileName.replace(/[_\-]+/g,' ');

  // Patterns that match full title phrases including year
  // Try to grab the full phrase like "Winter Interim Report, 2025-26" directly
  const fullPatterns = [
    {re:/Winter\s+Interim\s+Report,?\s*(20\d{2}[\-–]\d{2,4})/i, make:(m)=>({title:'Winter Interim Report, '+m[1],type:'report'})},
    {re:/Fall\s+Interim\s+Report,?\s*(20\d{2}[\-–]\d{2,4})/i, make:(m)=>({title:'Fall Interim Report, '+m[1],type:'report'})},
    {re:/Spring\s+Interim\s+Report,?\s*(20\d{2}[\-–]\d{2,4})/i, make:(m)=>({title:'Spring Interim Report, '+m[1],type:'report'})},
    {re:/Winter\s+Term[\s\-]*End\s+(?:Report|Comment)s?,?\s*(20\d{2}[\-–]\d{2,4})/i, make:(m)=>({title:'Winter Term End Comments, '+m[1],type:'comments'})},
    {re:/Fall\s+Term[\s\-]*End\s+(?:Report|Comment)s?,?\s*(20\d{2}[\-–]\d{2,4})/i, make:(m)=>({title:'Fall Term End Comments, '+m[1],type:'comments'})},
    {re:/Spring\s+Term[\s\-]*End\s+(?:Report|Comment)s?,?\s*(20\d{2}[\-–]\d{2,4})/i, make:(m)=>({title:'Spring Term End Comments, '+m[1],type:'comments'})},
  ];

  // Try full patterns with year on PDF text first
  for(const p of fullPatterns){
    const m = txt.match(p.re);
    if(m) return p.make(m);
  }

  // Simple patterns (no year capture)
  const simplePatterns = [
    {re:/Winter\s+Interim\s+Report/i, title:'Winter Interim Report', type:'report'},
    {re:/Fall\s+Interim\s+Report/i, title:'Fall Interim Report', type:'report'},
    {re:/Spring\s+Interim\s+Report/i, title:'Spring Interim Report', type:'report'},
    {re:/Winter\s+Term[\s\-]*End\s+(Report|Comment)/i, title:'Winter Term End Comments', type:'comments'},
    {re:/Fall\s+Term[\s\-]*End\s+(Report|Comment)/i, title:'Fall Term End Comments', type:'comments'},
    {re:/Spring\s+Term[\s\-]*End\s+(Report|Comment)/i, title:'Spring Term End Comments', type:'comments'},
    {re:/Winter\s+Term\s+Report/i, title:'Winter Term Report', type:'report'},
    {re:/Fall\s+Term\s+Report/i, title:'Fall Term Report', type:'report'},
    {re:/Spring\s+Term\s+Report/i, title:'Spring Term Report', type:'report'},
    {re:/Transcript/i, title:'Transcript', type:'transcript'},
    {re:/College\s+Research\s+Survey?\s*#?\s*0/i, title:'College Research Survey #0', type:'survey'},
    {re:/College\s+Research\s+Survey?\s*#?\s*1/i, title:'College Research Survey #1', type:'survey'},
    {re:/College\s+Research\s+Survey?\s*#?\s*2/i, title:'College Research Survey #2', type:'survey'},
    {re:/College\s+Research\s+Survey?\s*#?\s*3/i, title:'College Research Survey #3', type:'survey'},
    {re:/Working\s+College\s+List/i, title:'Working College List', type:'survey'},
    {re:/Parent\s+(Questionnaire|Survey|Brag)/i, title:'Parent Questionnaire', type:'parent'},
    {re:/Teacher\s+Rec/i, title:'Teacher Recommendation', type:'teacher'},
    {re:/Advisor\s+Comment/i, title:'Advisor Comments', type:'comments'},
    {re:/Dorm(itory)?\s+Comment|House\s+(Comment|Report)/i, title:'House Comments', type:'comments'},
  ];

  for(const src of [txt, fn]){
    for(const p of simplePatterns){
      if(p.re.test(src)){
        // Try to find a year near the match in the PDF text only
        const yearMatch = txt.match(/20\d{2}[\-–]\d{2}/);
        const year = yearMatch ? ', '+yearMatch[0] : '';
        return {title: p.title+year, type: p.type};
      }
    }
  }

  // Fallback: clean filename
  const cleaned = fileName.replace(/\.[^.]+$/,'').replace(/[_\-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim();
  return {title:cleaned, type:'other'};
}

// ══════════════ PDF RENDER ══════════════
async function renderPdf(container, pdfData, scale){
  scale = scale || 1.5;
  container.innerHTML='<div style="text-align:center;padding:20px;color:var(--gray)"><span class="dots"><span></span><span></span><span></span></span> Rendering...</div>';
  try{
    const pdf = await pdfjsLib.getDocument({data:pdfData.slice(0)}).promise;
    container.innerHTML='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width; canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      container.appendChild(canvas);
    }
  }catch(e){
    console.error('PDF error:',e);
    container.innerHTML='<div style="padding:20px;color:var(--red);font-size:13px">Could not render this PDF.</div>';
  }
}

async function extractFirstPageText(arrayBuf){
  try{
    const pdf=await pdfjsLib.getDocument({data:arrayBuf.slice(0)}).promise;
    const page=await pdf.getPage(1);
    const tc=await page.getTextContent();
    return tc.items.map(i=>i.str).join(' ');
  }catch{return '';}
}

// ══════════════ STUDENT MGMT ══════════════
document.getElementById('add-stu-btn').addEventListener('click',()=>{
  document.getElementById('add-modal').classList.remove('hid');
  const inp=document.getElementById('add-name'); inp.value=''; inp.focus();
  document.getElementById('add-go').disabled=true;
});
function hideAdd(){document.getElementById('add-modal').classList.add('hid')}
document.getElementById('add-name').addEventListener('input',e=>{document.getElementById('add-go').disabled=!e.target.value.trim()});
document.getElementById('add-name').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.value.trim())addStu()});

function addStu(){
  const name=document.getElementById('add-name').value.trim();
  if(!name)return;
  const id='s_'+Date.now();
  students.push({id,name,docs:[],notes:''});
  curStu=id; hideAdd(); render(); save();
}
function selStu(id){curStu=id;render()}
function showDelStu(id){
  const s=students.find(x=>x.id===id);if(!s)return;
  delStuTarget=id;
  document.getElementById('del-stu-msg').textContent='Remove "'+s.name+'" and all their documents?';
  document.getElementById('del-stu-modal').classList.remove('hid');
}
function hideDelStu(){document.getElementById('del-stu-modal').classList.add('hid');delStuTarget=null}
function confirmDelStu(){
  if(!delStuTarget)return;
  students=students.filter(s=>s.id!==delStuTarget);
  if(curStu===delStuTarget)curStu=students.length?students[0].id:null;
  hideDelStu();render();save();toast('Student removed');
}

// ══════════════ DOC MGMT ══════════════
function showDel(docId){
  const stu=students.find(s=>s.id===curStu);
  const doc=stu?.docs.find(d=>d.id===docId);if(!doc)return;
  delTarget=docId;
  document.getElementById('del-msg').textContent='Remove "'+doc.title+'"?';
  document.getElementById('del-modal').classList.remove('hid');
}
function hideDel(){document.getElementById('del-modal').classList.add('hid');delTarget=null}
function confirmDel(){
  if(!delTarget)return;
  const stu=students.find(s=>s.id===curStu);
  if(stu)stu.docs=stu.docs.filter(d=>d.id!==delTarget);
  delete openDocs[delTarget]; hideDel();render();save();toast('Document removed');
}

function renameDoc(docId,newTitle){
  const stu=students.find(s=>s.id===curStu);
  const doc=stu?.docs.find(d=>d.id===docId);
  if(doc&&newTitle.trim())doc.title=newTitle.trim();
  editingTitle=null; render(); save();
}

// File upload
document.getElementById('file-input').addEventListener('change',async e=>{
  const files=Array.from(e.target.files||[]);if(!files.length)return;
  const stu=students.find(s=>s.id===curStu);if(!stu)return;

  for(const file of files){
    const ext=file.name.split('.').pop().toLowerCase();
    const id='doc_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    if(ext==='pdf'){
      const buf=await file.arrayBuffer();
      const fpText=await extractFirstPageText(buf);
      const {title,type}=autoTitle(file.name,fpText);
      stu.docs.push({id,title,type,mode:'pdf',pdfData:buf,fileName:file.name});
    }else{
      const content=await file.text();
      const {title,type}=autoTitle(file.name,content.slice(0,500));
      stu.docs.push({id,title,type,mode:'text',content,fileName:file.name});
    }
  }
  e.target.value='';render();save();
  toast(files.length===1?'Document added':files.length+' documents added');
});

// ══════════════ VIEW MODE ══════════════
function setView(v){
  curView=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  render();
}

// ══════════════ RENDER ══════════════
function render(){
  renderTabs();
  const noStu=document.getElementById('no-stu');
  const stuView=document.getElementById('stu-view');
  if(!curStu||!students.find(s=>s.id===curStu)){
    noStu.style.display='flex';stuView.classList.add('hid');return;
  }
  noStu.style.display='none';stuView.classList.remove('hid');stuView.style.display='flex';
  const stu=students.find(s=>s.id===curStu);
  document.getElementById('doc-count').textContent=stu.docs.length+' document'+(stu.docs.length!==1?'s':'');

  const noDocs=document.getElementById('no-docs');
  const accView=document.getElementById('accordion-view');
  const galView=document.getElementById('gallery-view');

  if(stu.docs.length===0){
    noDocs.classList.remove('hid');accView.classList.add('hid');galView.classList.add('hid');return;
  }
  noDocs.classList.add('hid');

  if(curView==='accordion'){
    accView.classList.remove('hid');galView.classList.add('hid');
    renderAccordion(stu);
  }else{
    accView.classList.add('hid');galView.classList.remove('hid');
    renderGallery(stu);
  }
}

function renderTabs(){
  const c=document.getElementById('stu-tabs');c.innerHTML='';
  students.forEach(s=>{
    const t=document.createElement('button');
    t.className='stu-tab'+(s.id===curStu?' on':'');
    t.innerHTML=esc(s.name)+'<span class="x" title="Remove" onclick="event.stopPropagation();showDelStu(\''+s.id+'\')">✕</span>';
    t.addEventListener('click',()=>selStu(s.id));
    c.appendChild(t);
  });
}

function renderAccordion(stu){
  const container=document.getElementById('accordion-view');
  container.innerHTML='';
  stu.docs.forEach((doc,idx)=>{
    const dt=DT[doc.type]||DT.other;
    const open=!!openDocs[doc.id];
    const card=document.createElement('div');
    card.className='dc'+(open?' open':'');
    card.draggable=true;
    card.dataset.idx=idx;
    card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',idx);card.style.opacity='.4'});
    card.addEventListener('dragend',()=>{card.style.opacity='1'});
    card.addEventListener('dragover',e=>{e.preventDefault();card.style.borderTop='2px solid var(--gold)'});
    card.addEventListener('dragleave',()=>{card.style.borderTop=''});
    card.addEventListener('drop',e=>{
      e.preventDefault();card.style.borderTop='';
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const to=idx;if(from===to)return;
      const [moved]=stu.docs.splice(from,1);stu.docs.splice(to,0,moved);
      render();save();
    });

    const hdr=document.createElement('div');
    hdr.className='dc-h';
    const isEditing=editingTitle===doc.id;
    hdr.innerHTML=`
      <span class="dc-chev">${open?'▾':'▸'}</span>
      <span class="dc-badge" style="background:${dt.bg};color:${dt.c}">${dt.l}</span>
      ${isEditing?
        `<input class="dc-title-input" id="title-edit-${doc.id}" value="${esc(doc.title)}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){renameDoc('${doc.id}',this.value);event.stopPropagation()}" onblur="renameDoc('${doc.id}',this.value)">`
        :`<span class="dc-title" title="${esc(doc.title)}">${esc(doc.title)}</span>`
      }
      <span class="dc-meta">${doc.fileName?esc(doc.fileName):''}</span>
      <span class="dc-actions">
        <button class="dc-act-btn" onclick="event.stopPropagation();editingTitle='${doc.id}';render();setTimeout(()=>document.getElementById('title-edit-${doc.id}')?.select(),50)" title="Rename">✎</button>
        <button class="dc-act-btn del" onclick="event.stopPropagation();showDel('${doc.id}')" title="Remove">✕</button>
      </span>
    `;
    if(!isEditing){
      hdr.style.cursor='pointer';
      hdr.addEventListener('click',()=>{openDocs[doc.id]=!openDocs[doc.id];render()});
    }
    card.appendChild(hdr);

    if(open){
      const rule=document.createElement('div');rule.className='gold-rule';card.appendChild(rule);
      const body=document.createElement('div');body.className='dc-body';
      if(doc.mode==='pdf'&&doc.pdfData){
        const pages=document.createElement('div');pages.className='pdf-pages';
        body.appendChild(pages);
        setTimeout(()=>renderPdf(pages,doc.pdfData),0);
      }else if(doc.mode==='text'&&doc.content){
        const div=document.createElement('div');div.className='text-content';div.textContent=doc.content;
        body.appendChild(div);
      }
      card.appendChild(body);
    }
    container.appendChild(card);
  });
}

function renderGallery(stu){
  const container=document.getElementById('gallery-view');
  container.innerHTML='';
  stu.docs.forEach(doc=>{
    const dt=DT[doc.type]||DT.other;
    const card=document.createElement('div');card.className='gal-card';
    card.innerHTML=`
      <div class="gal-card-header">
        <span class="gal-card-badge" style="background:${dt.bg};color:${dt.c}">${dt.l}</span>
        <span class="gal-card-title" title="${esc(doc.title)}">${esc(doc.title)}</span>
      </div>
    `;
    const body=document.createElement('div');body.className='gal-card-body';
    if(doc.mode==='pdf'&&doc.pdfData){
      setTimeout(()=>renderPdf(body,doc.pdfData,1.2),0);
    }else if(doc.mode==='text'&&doc.content){
      const div=document.createElement('div');
      div.style.cssText='padding:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--white)';
      div.textContent=doc.content;body.appendChild(div);
    }
    card.appendChild(body);
    const actions=document.createElement('div');actions.className='gal-card-actions';
    actions.innerHTML=`
      <button class="dc-act-btn" onclick="editingTitle='${doc.id}';setView('accordion');openDocs['${doc.id}']=true" title="Rename">✎ Rename</button>
      <button class="dc-act-btn del" onclick="showDel('${doc.id}')" title="Remove">✕ Remove</button>
    `;
    card.appendChild(actions);
    container.appendChild(card);
  });
}

// ══════════════ UTILS ══════════════
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500)}

// ══════════════ PERSISTENCE ══════════════
function ab2b64(buf){const bytes=new Uint8Array(buf);let b='';const ch=8192;for(let i=0;i<bytes.length;i+=ch)b+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));return btoa(b)}
function b642ab(b64){const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes.buffer}

function save(){
  try{
    const data={students:students.map(s=>({...s,docs:s.docs.map(d=>{
      if(d.mode==='pdf'&&d.pdfData)return{...d,pdfB64:ab2b64(d.pdfData),pdfData:undefined};
      return{...d,pdfData:undefined};
    })})),curStu,openDocs};
    localStorage.setItem('recos6',JSON.stringify(data));
  }catch(e){console.warn('Save failed:',e.message)}
}
function load(){
  try{
    const raw=localStorage.getItem('recos6');if(!raw)return false;
    const data=JSON.parse(raw);
    students=data.students||[];curStu=data.curStu||null;openDocs=data.openDocs||{};
    students.forEach(s=>s.docs.forEach(d=>{
      if(d.mode==='pdf'&&d.pdfB64){d.pdfData=b642ab(d.pdfB64);delete d.pdfB64}
    }));
    return students.length>0;
  }catch{return false}
}
setInterval(save,10000);

// ══════════════ INIT ══════════════
if(load())render(); else render();
</script>
